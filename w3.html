    <style>
        /* 1. 기본 환경 설정 - 다크모드 */
        body {
            background-color: #1a1a1a;
            margin: 0;
            overflow: hidden;
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            color: #e0e0e0;
        }

        /* 2. 상단 헤더 - 다크모드 */
        header {
            background: #2d2d2d;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 100;
            flex-shrink: 0;
        }

        .title { font-size: 2rem; font-weight: 900; color: #64b5f6; letter-spacing: -1px; }
        .clock-container { display: flex; align-items: center; gap: 15px; color: #b0b0b0; }
        #currentDate { font-size: 1.3rem; font-weight: bold; color: #a0a0a0; }
        #currentTime { font-size: 2rem; font-weight: 900; color: #e0e0e0; }

        /* 3. 메인 컨텐츠 영역 (좌우 분할) */
        .main-content {
            flex: 1;
            display: flex;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        /* 좌측: 지도 영역 - 다크모드 */
        .left-panel {
            flex: 0.35;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #2d2d2d;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .map-wrapper {
            position: relative;
            height: 95%;
            aspect-ratio: 420 / 460;
        }

        svg.map-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
            filter: drop-shadow(10px 10px 20px rgba(0,0,0,0.4));
        }

        .land {
            fill: #3a3a3a;
            stroke: #555555;
            stroke-width: 2;
            transition: fill 0.3s;
        }

        .inset-box {
            fill: rgba(45, 45, 45, 0.8);
            stroke: #555555;
            stroke-width: 2;
            stroke-dasharray: 5, 5;
        }

        /* 우측: 주간 예보 영역 - 다크모드 */
        .right-panel {
            flex: 0.65;
            background: #2d2d2d;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }

        .panel-header {
            font-size: 1.5rem;
            font-weight: 800;
            color: #64b5f6;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #555555;
        }

        .forecast-table-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .table-header-wrapper {
            position: sticky;
            top: 0;
            z-index: 20;
            background: #2d2d2d;
        }

        .table-body-wrapper {
            overflow: hidden;
            height: calc(100% - 50px);
        }

        .scrolling-content {
            animation: scrollUp 30s linear infinite;
        }

        @keyframes scrollUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        .scrolling-content:hover {
            animation-play-state: paused;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1.1rem;
            text-align: center;
        }

        th {
            background: #2d2d2d;
            padding: 8px 2px;
            color: #a0a0a0;
            font-weight: 700;
            border-bottom: 2px solid #555555;
        }

        .table-header-wrapper table,
        .table-body-wrapper table {
            table-layout: fixed;
        }

        .table-header-wrapper th:first-child,
        .table-body-wrapper td:first-child {
            width: 55px;
        }

        td {
            padding: 5px 2px;
            border-bottom: 1px solid #555555;
            vertical-align: middle;
        }

        tbody tr:nth-child(odd) {
            background-color: #3a3a3a;
        }

        tbody tr:nth-child(even) {
            background-color: #2d2d2d;
        }

        .region-name {
            font-weight: 800;
            font-size: 1.2rem;
            color: #e0e0e0;
            text-align: left;
            padding-left: 5px;
            white-space: nowrap;
        }

        .forecast-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1px;
        }

        .mini-icon svg { width: 32px; height: 32px; }
        .mini-temp { font-size: 0.95rem; font-weight: 600; }
        .mini-temp .low { color: #64b5f6; }
        .mini-temp .high { color: #ff8080; }

        .forecast-table-container::-webkit-scrollbar { width: 6px; height: 6px; }
        .forecast-table-container::-webkit-scrollbar-track { background: transparent; }
        .forecast-table-container::-webkit-scrollbar-thumb { background: #555555; border-radius: 3px; }

        /* 4. 마커 및 아이콘 (지도용) - 다크모드 */
        .marker {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .weather-svg {
            width: 45px;
            height: 45px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 3px 3px rgba(0,0,0,0.4));
        }

        .info-box {
            background: rgba(45, 45, 45, 0.95);
            border: 2px solid #555555;
            padding: 3px 12px;
            border-radius: 20px;
            margin-top: -2px;
            font-size: 1.1rem;
            font-weight: 900;
            color: #e0e0e0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .temp-low { color: #64b5f6; margin-left: 4px; }
        .temp-high { color: #ff8080; margin-left: 2px; }
        .temp-separator { color: #888888; margin: 0 1px; }

        /* 업데이트 시간 표시 - 다크모드 */
        .server-time {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #888888;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(45, 45, 45, 0.8);
            padding: 5px 10px;
            border-radius: 15px;
            z-index: 999;
            pointer-events: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
    </style>

        // --- 1. 시계 기능 ---
        function updateClock() {
            const now = new Date();
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            const dateStr = `${now.getFullYear()}. ${String(now.getMonth()+1).padStart(2, '0')}. ${String(now.getDate()).padStart(2, '0')} (${days[now.getDay()]})`;
            const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            document.getElementById('currentDate').innerText = dateStr;
            document.getElementById('currentTime').innerText = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 2. 아이콘 SVG - 다크모드 ---
        const getIconSvg = (type) => {
            const icons = {
                sunny: `<svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="14" fill="#ffb900" /><g stroke="#ffb900" stroke-width="5" stroke-linecap="round"><line x1="32" y1="4" x2="32" y2="9" /><line x1="32" y1="55" x2="32" y2="60" /><line x1="4" y1="32" x2="9" y2="32" /><line x1="55" y1="32" x2="60" y2="32" /><line x1="12" y1="12" x2="16" y2="16" /><line x1="48" y1="48" x2="52" y2="52" /><line x1="12" y1="52" x2="16" y2="48" /><line x1="48" y1="16" x2="52" y2="12" /></g></svg>`,

        // --- 3. 지도 마커 그리기 ---
        function drawMapMarkers() {
            const container = document.getElementById('mapContainer');
            weatherData.forEach(city => {
                const el = document.createElement('div');
                el.className = 'marker';
                el.style.top = city.top + '%';
                el.style.left = city.left + '%';
                const delay = (Math.random() * 2).toFixed(2);

                el.innerHTML = `
                    <div class="weather-svg" style="animation-delay: -${delay}s">
                        ${getIconSvg(city.type)}
                    </div>
                    <div class="info-box">
                        ${city.name} <span class="temp-low">${city.tempLow}°</span><span class="temp-separator">/</span><span class="temp-high">${city.tempHigh}°</span>
                    </div>
                `;
                container.appendChild(el);
            });
        }

        // --- 4. 주간 예보 테이블 그리기 ---
        function drawForecastTable() {
            const tableHeaderRow = document.getElementById('tableHeaderRow');
            const tableBody = document.getElementById('tableBody');
            const tableBodyClone = document.getElementById('tableBodyClone');

            // 헤더에 날짜 추가
            if(weatherData.length > 0 && weatherData[0].weekly) {
                weatherData[0].weekly.forEach(day => {
                    const th = document.createElement('th');
                    th.innerText = day.date;
                    tableHeaderRow.appendChild(th);
                });
            }

            // 테이블 행 생성 함수
            function createRows(targetBody) {
                weatherData.forEach(city => {
                    const tr = document.createElement('tr');

                    const tdName = document.createElement('td');
                    tdName.className = 'region-name';
                    tdName.innerText = city.name;
                    tr.appendChild(tdName);

                    if(city.weekly) {
                        city.weekly.forEach(day => {
                            const td = document.createElement('td');
                            td.innerHTML = `
                                <div class="forecast-cell">
                                    <div class="mini-icon">${getIconSvg(day.type)}</div>
                                    <div class="mini-temp"><span class="low">${day.tempLow}°</span>/<span class="high">${day.tempHigh}°</span></div>
                                </div>
                            `;
                            tr.appendChild(td);
                        });
                    }
                    targetBody.appendChild(tr);
                });
            }

            // 원본과 복제본 모두 생성 (끊김없는 스크롤을 위해)
            createRows(tableBody);
            createRows(tableBodyClone);
        }

        drawMapMarkers();
        drawForecastTable();
