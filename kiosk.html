<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>페이지 자동 순환(20sec)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000; /* 흰 번쩍임 방지용 검정 배경 */
        }
        .page-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            z-index: 1;
        }
        .page-frame.visible {
            opacity: 1;
            z-index: 2;
        }
    </style>
</head>
<body>

    <iframe id="frameA" class="page-frame"></iframe>
    <iframe id="frameB" class="page-frame"></iframe>

    <script>
        // 1. 순환할 파일 목록을 배열로 정의
        const pages = Object.freeze(['w3.html', 's1.html', 'd1.html', 'tapo.html', 'image01.html']);

        // 2. 현재 보여주고 있는 페이지의 인덱스
        let currentIndex = 0;

        // 3. 두 iframe 요소 (크로스페이드용 더블 버퍼)
        const frameA = document.getElementById('frameA');
        const frameB = document.getElementById('frameB');
        let activeFrame   = frameA; // 현재 화면에 보이는 iframe
        let inactiveFrame = frameB; // 백그라운드에서 로드 대기 중인 iframe

        // 순환 타이머 ID
        let rotationTimer = null;

        // s1.html 1분 표시 중인지 여부
        let isInteractionMode = false;

        // 전환 중 중복 실행 방지
        let isTransitioning = false;

        // 더블 스페이스 감지 설정
        let lastSpaceTime = 0;
        const DOUBLE_SPACE_WINDOW = 500; // 500ms 이내 2회 입력

        // 페이지 로드 함수 (크로스페이드)
        function loadPage(index) {
            if (isTransitioning) return;
            isTransitioning = true;

            const url = pages[index] + '?t=' + Date.now();
            console.log(`이동함: ${pages[index]}`);

            // 비활성 iframe에 새 페이지를 미리 로드
            inactiveFrame.onload = () => {
                // 새 페이지 페이드 인, 이전 페이지 페이드 아웃
                inactiveFrame.classList.add('visible');
                activeFrame.classList.remove('visible');

                // 역할 교체
                [activeFrame, inactiveFrame] = [inactiveFrame, activeFrame];

                // 전환 애니메이션(1.5s) 완료 후 플래그 해제
                setTimeout(() => { isTransitioning = false; }, 1600);
            };
            inactiveFrame.src = url;
        }

        // 초기 첫 페이지는 activeFrame에 직접 로드 (배경이 검정이므로 번쩍임 없음)
        function loadFirstPage(index) {
            activeFrame.onload = () => {
                activeFrame.classList.add('visible');
                isTransitioning = false;
            };
            activeFrame.src = pages[index] + '?t=' + Date.now();
        }

        // 순환 타이머 시작
        function startRotation() {
            stopRotation();
            rotationTimer = setInterval(() => {
                currentIndex = (currentIndex + 1) % pages.length;
                loadPage(currentIndex);
            }, 20000); // 20초마다 순환
        }

        // 순환 타이머 중지
        function stopRotation() {
            if (rotationTimer) {
                clearInterval(rotationTimer);
                rotationTimer = null;
            }
        }

        // 더블 스페이스 감지 시 s1.html 1분간 표시
        function triggerInteractionMode() {
            if (isInteractionMode) return;

            isInteractionMode = true;
            stopRotation();

            const s1Index = pages.indexOf('s1.html');
            loadPage(s1Index);
            console.log('더블 스페이스 감지: s1.html 1분간 표시');

            // 1분(60초) 후 s1.html 다음 순서부터 정상 순환 재개
            setTimeout(() => {
                isInteractionMode = false;
                currentIndex = (pages.indexOf('s1.html') + 1) % pages.length;
                loadPage(currentIndex);
                startRotation();
                console.log('정상 순환 재개');
            }, 60000); // 1분
        }

        // 스페이스 입력 처리 (더블 클릭 판정)
        function handleSpacePress() {
            const now = Date.now();
            if (now - lastSpaceTime <= DOUBLE_SPACE_WINDOW) {
                lastSpaceTime = 0; // 연속 트리거 방지
                triggerInteractionMode();
            } else {
                lastSpaceTime = now;
            }
        }

        // 부모 문서(kiosk.html 자체)에서의 키보드 입력
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                handleSpacePress();
            }
        });

        // iframe(자식 페이지)에서 전달된 메시지 처리
        window.addEventListener('message', (e) => {
            if (e.origin !== window.location.origin) return;
            if (e.data && e.data.type === 'space-pressed') {
                handleSpacePress();
            }
        });

        // 초기 페이지 로드 및 순환 시작
        isTransitioning = true;
        loadFirstPage(currentIndex);
        startRotation();
    </script>

</body>
</html>
