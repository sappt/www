<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta http-equiv="refresh" content="600">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시험일정 현황 대시보드 - 샤프트리서치</title>
  <meta name="description" content="샤프트리서치 SAPPT 시험일정 현황 대시보드">
  <meta name="robots" content="index, follow">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #1a1a1a; color: #e0e0e0;
      font-size: clamp(12px, 1.3vmin, 20px);
    }
    .container {
      width: 100%; height: 100vh;
      background: #2d2d2d;
      padding: clamp(10px, 1vmin, 20px);
      display: flex; flex-direction: column; overflow: hidden;
    }
    header {
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 2px solid #64b5f6;
      padding-bottom: clamp(6px, 0.8vmin, 14px);
      margin-bottom: clamp(8px, 1vmin, 16px);
      flex-wrap: wrap; gap: 8px; flex-shrink: 0;
    }
    header h1 {
      margin: 0; font-size: clamp(16px, 2.2vmin, 32px);
      color: #64b5f6; font-weight: 800;
    }
    .kpi-row {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: clamp(6px, 0.8vmin, 12px);
      margin-bottom: clamp(8px, 1vmin, 14px); flex-shrink: 0;
    }
    .kpi-card {
      background: #3a3a3a; border-radius: 12px;
      padding: clamp(10px, 1vmin, 18px);
      border: 1px solid #555555;
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .kpi-label { font-size: clamp(9px, 0.9vmin, 13px); color: #a0a0a0; margin-bottom: 6px; }
    .kpi-value { font-size: clamp(22px, 3vmin, 40px); font-weight: 900; line-height: 1; }
    .kpi-sub { font-size: clamp(9px, 0.9vmin, 13px); color: #888888; margin-top: 4px; }
    .kpi-icon {
      width: clamp(30px, 3.5vmin, 50px); height: clamp(30px, 3.5vmin, 50px);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(14px, 1.8vmin, 26px); flex-shrink: 0;
    }
    .chart-section {
      flex: 1; display: flex; flex-direction: column;
      gap: clamp(6px, 0.8vmin, 12px); min-height: 0;
    }
    .chart-row {
      flex: 1; display: grid;
      gap: clamp(6px, 0.8vmin, 12px); min-height: 0;
    }
    .chart-row-2 { grid-template-columns: 1fr 1fr; }
    .chart-row-1 { grid-template-columns: 1fr; }
    .chart-card {
      background: #3a3a3a; border-radius: 12px;
      padding: clamp(10px, 1vmin, 16px);
      border: 1px solid #555555;
      display: flex; flex-direction: column; min-height: 0; overflow: hidden;
    }
    .chart-title {
      font-size: clamp(11px, 1.1vmin, 16px); font-weight: 700; color: #c0c0c0;
      margin-bottom: clamp(5px, 0.5vmin, 10px);
      border-bottom: 1px solid #555555; padding-bottom: clamp(4px, 0.4vmin, 8px);
      flex-shrink: 0;
    }
    .chart-el { flex: 1; min-height: 0; }
    .footer {
      text-align: left; color: #888888;
      font-size: clamp(9px, 0.9vmin, 14px);
      padding-top: clamp(6px, 0.6vmin, 10px); flex-shrink: 0;
    }
    @media (max-width: 900px) {
      .kpi-row { grid-template-columns: repeat(2, 1fr); }
      .chart-row-2 { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .kpi-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>📊 시험일정 현황 대시보드</h1>
  </header>

  <div class="kpi-row">
    <div class="kpi-card">
      <div>
        <div class="kpi-label">전체 시험일정</div>
        <div class="kpi-value" style="color:#64b5f6">270</div>
        <div class="kpi-sub">2026년 전체</div>
      </div>
      <div class="kpi-icon" style="background:#1a3a5c;color:#64b5f6" aria-label="전체 시험일정">📋</div>
    </div>
    <div class="kpi-card">
      <div>
        <div class="kpi-label">진행중 시험</div>
        <div class="kpi-value" style="color:#80d080">145</div>
        <div class="kpi-sub">처리완료·조사·성적서 진행</div>
      </div>
      <div class="kpi-icon" style="background:#1a3a1a;color:#80d080" aria-label="진행중 시험">🔬</div>
    </div>
    <div class="kpi-card">
      <div>
        <div class="kpi-label">시작전 시험</div>
        <div class="kpi-value" style="color:#a0a0a0">125</div>
        <div class="kpi-sub">처리 대기</div>
      </div>
      <div class="kpi-icon" style="background:#3a3a3a;color:#a0a0a0" aria-label="시작전 시험">⏳</div>
    </div>
    <div class="kpi-card">
      <div>
        <div class="kpi-label">이번달 출장</div>
        <div class="kpi-value" style="color:#ffb74d">68</div>
        <div class="kpi-sub">2026년 5월</div>
      </div>
      <div class="kpi-icon" style="background:#3a2a00;color:#ffb74d" aria-label="이번달 출장">🚗</div>
    </div>
  </div>

  <div class="chart-section">
    <div class="chart-row chart-row-2">
      <div class="chart-card">
        <div class="chart-title">진행상태별 현황</div>
        <div id="chart-status" class="chart-el" role="img" aria-label="진행상태별 현황 차트"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">구분별 시험현황</div>
        <div id="chart-category" class="chart-el" role="img" aria-label="구분별 시험현황 차트"></div>
      </div>
    </div>

    <div class="chart-row chart-row-1">
      <div class="chart-card">
        <div class="chart-title">월별 업무·출장 분석 (2026년)</div>
        <div id="chart-monthly" class="chart-el" role="img" aria-label="월별 출장 분석 차트"></div>
      </div>
    </div>
  </div>

  <div class="footer">Last Update: 2026-05-23 07:50:02 (KST)</div>
</div>

<script>
  const textColor = '#a0a0a0', gridColor = '#555555';

  function ec(id) { return echarts.init(document.getElementById(id)); }

  // 1. 진행상태별 현황 (Donut)
  ec('chart-status').setOption({
    backgroundColor: 'transparent',
    tooltip: { trigger: 'item', textStyle: { fontSize: 12 } },
    legend: { orient: 'vertical', right: '5%', top: 'middle', textStyle: { color: textColor, fontSize: 11 } },
    series: [{
      type: 'pie', radius: ['42%', '68%'], center: ['38%', '50%'],
      label: { show: true, formatter: '{b}\n{c}건 ({d}%)', color: textColor, fontSize: 11 },
      labelLine: { lineStyle: { color: gridColor } },
      data: [{ value: 142, name: '처리완료', itemStyle: { color: '#3b82f6' } }, { value: 125, name: '시작전', itemStyle: { color: '#94a3b8' } }, { value: 3, name: '조사완료', itemStyle: { color: '#f59e0b' } }],
    }],
  });

  // 2. 구분별 시험현황 (Stacked Horizontal Bar)
  ec('chart-category').setOption({
    backgroundColor: 'transparent',
    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, textStyle: { fontSize: 12 } },
    grid: { left: '3%', right: '8%', bottom: '12%', top: '8%', containLabel: true },
    xAxis: { type: 'value', axisLabel: { color: textColor }, splitLine: { lineStyle: { color: gridColor } } },
    yAxis: { type: 'category', data: ['살충', '살균', '제초제', '기초시험'], axisLabel: { color: textColor, fontSize: 12 } },
    legend: { textStyle: { color: textColor, fontSize: 11 }, bottom: 0 },
    series: [{ name: '시작전', type: 'bar', stack: 'total', barMaxWidth: 36, itemStyle: { color: '#94a3b8' }, label: { show: true, position: 'inside', color: '#fff', fontSize: 10, formatter: (p) => p.value > 0 ? p.value : '' }, data: [55, 63, 0, 3] },
      { name: '처리완료', type: 'bar', stack: 'total', barMaxWidth: 36, itemStyle: { color: '#3b82f6' }, label: { show: true, position: 'inside', color: '#fff', fontSize: 10, formatter: (p) => p.value > 0 ? p.value : '' }, data: [75, 35, 18, 2] },
      { name: '조사완료', type: 'bar', stack: 'total', barMaxWidth: 36, itemStyle: { color: '#f59e0b' }, label: { show: true, position: 'inside', color: '#fff', fontSize: 10, formatter: (p) => p.value > 0 ? p.value : '' }, data: [3, 0, 0, 0] }],
  });

  // 3. 월별 출장 (Bar)
  ec('chart-monthly').setOption({
    backgroundColor: 'transparent',
    tooltip: { trigger: 'axis', textStyle: { fontSize: 12 } },
    grid: { left: '3%', right: '4%', bottom: '10%', top: '10%', containLabel: true },
    xAxis: {
      type: 'category', data: ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'],
      axisLabel: { color: textColor }, axisLine: { lineStyle: { color: gridColor } },
    },
    yAxis: { type: 'value', axisLabel: { color: textColor }, splitLine: { lineStyle: { color: gridColor } } },
    series: [{
      name: '출장·외근 건수', type: 'bar', barMaxWidth: 52,
      itemStyle: {
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: '#64b5f6' }, { offset: 1, color: '#1a3a5c' },
        ]),
        borderRadius: [4, 4, 0, 0],
      },
      label: { show: true, position: 'top', color: textColor, fontSize: 11 },
      data: [31, 18, 36, 81, 68, 14, 2, 0, 0, 0, 0, 0],
    }],
    legend: { textStyle: { color: textColor }, bottom: 0 },
  });

  function resizeCharts() {
    document.querySelectorAll('[id^="chart-"]').forEach(el => {
      const inst = echarts.getInstanceByDom(el);
      if (inst) inst.resize();
    });
  }

  function disposeCharts() {
    document.querySelectorAll('[id^="chart-"]').forEach(el => {
      const inst = echarts.getInstanceByDom(el);
      if (inst) inst.dispose();
    });
  }

  window.addEventListener('resize', resizeCharts);
  window.addEventListener('load', () => { setTimeout(resizeCharts, 50); });
  window.addEventListener('beforeunload', disposeCharts);
</script>
</body>
</html>
