<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  :root{
    --bg:#0b1220;
    --panel:#131c2e;
    --panel-2:#0f1729;
    --border:#1f2a44;
    --text:#e2e8f0;
    --muted:#94a3b8;
    --good:#34d399;
    --warn:#fbbf24;
    --danger:#f87171;
    --accent:#60a5fa;
    /* 실별 고유 색상 */
    --doc:#60a5fa;   /* 문서보관실 - 파랑 */
    --lab:#34d399;   /* 사육실 - 녹색 */
    --chm:#a78bfa;   /* 시약실 - 보라 */
    --shadow:0 4px 12px rgba(0,0,0,.35), 0 1px 2px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    background:var(--bg);color:var(--text);font-size:clamp(13px,1.35vmin,22px);line-height:1.45;
    display:flex;flex-direction:column;
  }

  /* 헤더 */
  .header{
    flex:0 0 auto;
    background:var(--panel);border-bottom:1px solid var(--border);
    padding:10px 22px;display:flex;justify-content:space-between;align-items:center;gap:16px;
  }
  .header h1{font-size:clamp(17px,1.9vmin,32px);font-weight:700;display:flex;align-items:center;gap:10px;white-space:nowrap}
  .logo-dot{
    width:10px;height:10px;border-radius:50%;background:var(--good);
    box-shadow:0 0 0 4px rgba(52,211,153,.2);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 4px rgba(52,211,153,.2)}
    50%{box-shadow:0 0 0 6px rgba(52,211,153,.35)}
  }
  .header-time{color:var(--muted);font-size:clamp(12.5px,1.25vmin,20px);white-space:nowrap;text-align:right}
  .header-time strong{color:var(--text);font-weight:500}

  /* ===== 상단: 3개 지점 현재값 카드 (Grafana stat 패널 스타일) ===== */
  .stat-row{
    flex:0 0 auto;
    display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
    padding:12px 12px 4px;
  }
  .room-pill{
    position:relative;
    background:var(--panel-2);
    border:1px solid var(--border);border-top:4px solid;
    border-radius:12px;padding:24px 28px;
    display:flex;align-items:center;gap:24px;
    box-shadow:var(--shadow);
    transition:background .4s ease, box-shadow .4s ease;
    min-height:192px;
  }
  .room-pill.doc{border-top-color:var(--doc)}
  .room-pill.lab{border-top-color:var(--lab)}
  .room-pill.chm{border-top-color:var(--chm)}
  .room-pill .icon{font-size:clamp(44px,6vmin,96px);line-height:1}
  .room-pill .info{flex:1;min-width:0}
  .room-pill .name{
    font-size:clamp(16px,2vmin,32px);color:var(--muted);
    margin-bottom:16px;letter-spacing:.2px;font-weight:600;
    display:flex;align-items:center;gap:8px;
  }
  .room-pill.doc .name .tag{color:var(--doc)}
  .room-pill.lab .name .tag{color:var(--lab)}
  .room-pill.chm .name .tag{color:var(--chm)}
  /* 온도/습도 메트릭 — 둘 다 크게 병렬 표시 */
  .room-pill .metrics{display:flex;gap:44px;align-items:flex-end;flex-wrap:wrap}
  .room-pill .metric{display:flex;flex-direction:column;gap:4px}
  .room-pill .metric .m-label{font-size:clamp(13px,1.45vmin,22px);color:var(--muted);font-weight:500;letter-spacing:.3px}
  .room-pill .metric .m-val{font-size:clamp(42px,5.8vmin,96px);font-weight:800;letter-spacing:-1px;line-height:1;display:inline-flex;align-items:baseline;gap:3px}
  .room-pill .metric .m-unit{font-size:clamp(15px,1.7vmin,28px);font-weight:600;opacity:.7}
  /* 온도 = 주황 계열, 습도 = 실별 색상 */
  .room-pill .metric.temp .m-val{color:#fcd34d}
  .room-pill.doc .metric.humid .m-val{color:var(--doc)}
  .room-pill.lab .metric.humid .m-val{color:var(--lab)}
  .room-pill.chm .metric.humid .m-val{color:var(--chm)}

  /* 80인치 TV 가시성: 습도 위험도 기반 카드 배경 신호 */
  .room-pill[data-bg="ok"]{
    background:linear-gradient(135deg, rgba(52,211,153,.16) 0%, var(--panel-2) 70%);
    box-shadow:0 0 0 1px rgba(52,211,153,.22) inset, var(--shadow);
  }
  .room-pill[data-bg="warn"]{
    background:linear-gradient(135deg, rgba(251,191,36,.20) 0%, var(--panel-2) 70%);
    box-shadow:0 0 0 1px rgba(251,191,36,.30) inset, var(--shadow);
  }
  .room-pill[data-bg="crit"]{
    background:linear-gradient(135deg, rgba(248,113,113,.22) 0%, var(--panel-2) 70%);
    box-shadow:0 0 0 1px rgba(248,113,113,.35) inset, var(--shadow);
    animation: pulseCrit 2.4s ease-in-out infinite;
  }
  @keyframes pulseCrit{
    0%,100%{box-shadow:0 0 0 1px rgba(248,113,113,.35) inset, var(--shadow);}
    50%{box-shadow:0 0 0 1px rgba(248,113,113,.55) inset, 0 0 18px 4px rgba(248,113,113,.25);}
  }
  /* 상태 점 (카드 우상단) — data-bg 색상과 연동 */
  .room-pill .status{
    position:absolute;top:18px;right:20px;
    width:16px;height:16px;border-radius:50%;background:var(--muted);
  }
  .room-pill[data-bg="ok"]   .status{background:var(--good);box-shadow:0 0 0 4px rgba(52,211,153,.18)}
  .room-pill[data-bg="warn"] .status{background:var(--warn);box-shadow:0 0 0 4px rgba(251,191,36,.18)}
  .room-pill[data-bg="crit"] .status{background:var(--danger);box-shadow:0 0 0 4px rgba(248,113,113,.18);animation:blink 1.5s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}

  /* ===== 하단: 온도 / 습도 추이 2개 차트 ===== */
  .grid{
    flex:1 1 auto;
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr;
    gap:12px;
    padding:8px 12px 12px;
    min-height:0;
  }
  .panel{
    background:var(--panel);border:1px solid var(--border);border-radius:12px;
    box-shadow:var(--shadow);
    display:flex;flex-direction:column;
    min-height:0;min-width:0;
  }
  .panel-title{padding:11px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:clamp(14px,1.6vmin,26px);font-weight:700;letter-spacing:.2px;flex-shrink:0;}
  .panel-title .sub{color:var(--muted);font-size:clamp(11px,1.1vmin,18px);font-weight:500;}
  .chart{flex:1 1 auto;width:100%;min-height:0}

  @media(max-width:1100px){
    .grid{grid-template-columns:1fr;grid-template-rows:1fr 1fr}
    .stat-row{grid-template-columns:1fr}
  }
</style>

  return hours.map((_,i)=> +(base + amp*Math.sin(i/12) + (Math.random()-0.5)*0.4).toFixed(1));

}

/* ============ ② 습도 추이 (3실) ============ */
