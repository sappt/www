<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAPO 온습도 모니터링 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  :root{
    --bg:#0b1220;
    --panel:#131c2e;
    --panel-2:#0f1729;
    --border:#1f2a44;
    --text:#e2e8f0;
    --muted:#94a3b8;
    --good:#34d399;
    --warn:#fbbf24;
    --danger:#f87171;
    --accent:#60a5fa;
    --shadow:0 4px 12px rgba(0,0,0,.35), 0 1px 2px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;
    display:flex;flex-direction:column;
  }
  .header{
    flex:0 0 auto;
    background:var(--panel);border-bottom:1px solid var(--border);
    padding:12px 24px;display:flex;justify-content:space-between;align-items:center;
  }
  .header h1{font-size:18px;font-weight:600;display:flex;align-items:center;gap:10px}
  .logo-dot{
    width:10px;height:10px;border-radius:50%;background:var(--good);
    box-shadow:0 0 0 4px rgba(52,211,153,.2);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 4px rgba(52,211,153,.2)}
    50%{box-shadow:0 0 0 6px rgba(52,211,153,.35)}
  }
  .header-meta{display:flex;gap:14px;align-items:center;color:var(--muted);font-size:13px}
  .header-meta strong{color:var(--text);font-weight:500}
  .badge{padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500;border:1px solid transparent}
  .badge-good{background:rgba(52,211,153,.12);color:var(--good);border-color:rgba(52,211,153,.25)}
  .badge-warn{background:rgba(251,191,36,.12);color:var(--warn);border-color:rgba(251,191,36,.25)}

  .grid{
    flex:1 1 auto;
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;
    gap:12px;
    padding:12px;
    min-height:0;
  }
  .panel{
    background:var(--panel);border:1px solid var(--border);border-radius:10px;
    box-shadow:var(--shadow);
    padding:14px 18px;
    display:flex;flex-direction:column;
    min-height:0;min-width:0;
  }
  .panel-title{
    flex:0 0 auto;
    font-size:14px;font-weight:600;
    display:flex;justify-content:space-between;align-items:center;
    padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:8px;
  }
  .panel-title .sub{font-size:12px;color:var(--muted);font-weight:400}
  .chart{flex:1 1 auto;width:100%;min-height:0}
</style>
</head>
<body>

<div class="header">
  <h1><span class="logo-dot"></span>TAPO 온습도 모니터링 대시보드</h1>
  <div class="header-meta">
    <span>최근 갱신: <strong id="lastUpdate">2026-05-28 14:32:10</strong></span>
    <span class="badge badge-good">● Hub 연결 정상</span>
    <span class="badge badge-warn">알람 1건</span>
  </div>
</div>

<div class="grid">
  <div class="panel">
    <div class="panel-title">
      24시간 온습도 추이
      <span class="sub">2분 간격 · 다중 센서 비교</span>
    </div>
    <div id="chartTrend" class="chart"></div>
  </div>

  <div class="panel">
    <div class="panel-title">
      실시간 현재값
      <span class="sub">서버실 (T315)</span>
    </div>
    <div id="chartGauge" class="chart"></div>
  </div>

  <div class="panel">
    <div class="panel-title">
      7일 × 24시간 온도 히트맵
      <span class="sub">시간대별 평균 (°C)</span>
    </div>
    <div id="chartHeatmap" class="chart"></div>
  </div>

  <div class="panel">
    <div class="panel-title">
      센서별 온·습도 분포
      <span class="sub">현재값 산점도 · 안전구간 표시</span>
    </div>
    <div id="chartScatter" class="chart"></div>
  </div>
</div>

<script>
const darkAxis = {
  axisLine:{lineStyle:{color:'#334155'}},
  axisLabel:{color:'#94a3b8', fontSize:11},
  splitLine:{lineStyle:{color:'rgba(148,163,184,.08)'}}
};
const darkTooltip = {
  backgroundColor:'#1e293b',
  borderColor:'#334155',
  textStyle:{color:'#e2e8f0'}
};

/* ---------- 1. 시계열 추이 ---------- */
const trendChart = echarts.init(document.getElementById('chartTrend'));
const hours = Array.from({length:144}, (_,i)=>{
  const d = new Date(Date.now() - (143-i)*10*60*1000);
  return d.toTimeString().slice(0,5);
});
function genTemp(base, amp){
  return hours.map((_,i)=> +(base + amp*Math.sin(i/12) + (Math.random()-0.5)*0.6).toFixed(1));
}
function genHumid(base, amp){
  return hours.map((_,i)=> +(base + amp*Math.cos(i/14) + (Math.random()-0.5)*2).toFixed(1));
}
trendChart.setOption({
  color:['#60a5fa','#34d399','#fbbf24','#a78bfa','#22d3ee'],
  tooltip:{trigger:'axis', ...darkTooltip,
           axisPointer:{type:'cross', lineStyle:{color:'#475569'},
                        crossStyle:{color:'#475569'}}},
  legend:{data:['서버실','창고A','사무실','서버실 습도','창고A 습도'],
          textStyle:{color:'#cbd5e1'}, top:0, itemWidth:14, itemHeight:8},
  grid:{left:50, right:55, top:35, bottom:50},
  xAxis:{type:'category', data:hours, boundaryGap:false, ...darkAxis,
         axisLabel:{...darkAxis.axisLabel, interval:23}},
  yAxis:[
    {type:'value', name:'°C', min:18, max:30, ...darkAxis,
     nameTextStyle:{color:'#94a3b8', fontSize:11}},
    {type:'value', name:'%', min:30, max:80, ...darkAxis,
     nameTextStyle:{color:'#94a3b8', fontSize:11}}
  ],
  dataZoom:[{type:'inside'}, {type:'slider', height:14, bottom:6,
            borderColor:'#334155', fillerColor:'rgba(96,165,250,.18)',
            backgroundColor:'rgba(148,163,184,.06)',
            handleStyle:{color:'#475569'},
            textStyle:{color:'#94a3b8'},
            dataBackground:{lineStyle:{color:'#475569'},
                            areaStyle:{color:'rgba(96,165,250,.1)'}}}],
  series:[
    {name:'서버실', type:'line', data:genTemp(22,1.2), smooth:true, symbol:'none', lineStyle:{width:2}},
    {name:'창고A', type:'line', data:genTemp(26,1.6), smooth:true, symbol:'none', lineStyle:{width:2}},
    {name:'사무실', type:'line', data:genTemp(24,0.9), smooth:true, symbol:'none', lineStyle:{width:2}},
    {name:'서버실 습도', type:'line', yAxisIndex:1, data:genHumid(48,4),
     smooth:true, symbol:'none', lineStyle:{width:1.5, type:'dashed'}},
    {name:'창고A 습도', type:'line', yAxisIndex:1, data:genHumid(60,5),
     smooth:true, symbol:'none', lineStyle:{width:1.5, type:'dashed'}}
  ]
});

/* ---------- 2. 게이지 ---------- */
const gaugeChart = echarts.init(document.getElementById('chartGauge'));
gaugeChart.setOption({
  series:[
    {
      type:'gauge', center:['28%','55%'], radius:'80%',
      min:0, max:40, splitNumber:8,
      axisLine:{lineStyle:{width:16,
        color:[[0.45,'#60a5fa'],[0.7,'#34d399'],[1,'#f87171']]}},
      pointer:{itemStyle:{color:'auto'}, length:'70%', width:5},
      axisTick:{length:6, lineStyle:{color:'auto'}},
      splitLine:{length:12, lineStyle:{color:'auto'}},
      axisLabel:{color:'#94a3b8', fontSize:10, distance:-32},
      title:{offsetCenter:[0,'78%'], color:'#cbd5e1', fontSize:13},
      detail:{offsetCenter:[0,'45%'], formatter:'{value}°C',
              fontSize:24, color:'#f1f5f9', fontWeight:600},
      data:[{value:22.1, name:'온도'}]
    },
    {
      type:'gauge', center:['72%','55%'], radius:'80%',
      min:0, max:100, splitNumber:10,
      axisLine:{lineStyle:{width:16,
        color:[[0.4,'#fbbf24'],[0.7,'#34d399'],[1,'#60a5fa']]}},
      pointer:{itemStyle:{color:'auto'}, length:'70%', width:5},
      axisTick:{length:6, lineStyle:{color:'auto'}},
      splitLine:{length:12, lineStyle:{color:'auto'}},
      axisLabel:{color:'#94a3b8', fontSize:10, distance:-32},
      title:{offsetCenter:[0,'78%'], color:'#cbd5e1', fontSize:13},
      detail:{offsetCenter:[0,'45%'], formatter:'{value}%',
              fontSize:24, color:'#f1f5f9', fontWeight:600},
      data:[{value:48, name:'습도'}]
    }
  ]
});

/* ---------- 3. 히트맵 ---------- */
const heatmapChart = echarts.init(document.getElementById('chartHeatmap'));
const days = ['월','화','수','목','금','토','일'];
const heatData = [];
for(let d=0; d<7; d++){
  for(let h=0; h<24; h++){
    const base = 22 + 3*Math.sin((h-14)/4) + (d>=5?1:0);
    heatData.push([h, d, +(base + (Math.random()-0.5)*1.5).toFixed(1)]);
  }
}
heatmapChart.setOption({
  tooltip:{position:'top', formatter:p=>`${days[p.value[1]]} ${p.value[0]}시<br/><b>${p.value[2]}°C</b>`,
           ...darkTooltip},
  grid:{left:40, right:20, top:15, bottom:60},
  xAxis:{type:'category', data:[...Array(24).keys()], ...darkAxis,
         axisLabel:{...darkAxis.axisLabel, formatter:'{value}시', fontSize:10},
         splitArea:{show:false}},
  yAxis:{type:'category', data:days, ...darkAxis, splitArea:{show:false}},
  visualMap:{min:18, max:28, calculable:true, orient:'horizontal',
             left:'center', bottom:8, itemWidth:14, itemHeight:140,
             textStyle:{color:'#94a3b8', fontSize:11},
             inRange:{color:['#1e40af','#0891b2','#059669','#d97706','#dc2626']}},
  series:[{type:'heatmap', data:heatData,
           label:{show:true, fontSize:9, color:'#f1f5f9'},
           itemStyle:{borderColor:'#131c2e', borderWidth:1}}]
});

/* ---------- 4. 산점도 ---------- */
const scatterChart = echarts.init(document.getElementById('chartScatter'));
const sensors = [
  {name:'서버실', t:22.1, h:48},
  {name:'창고A', t:26.8, h:61},
  {name:'창고B', t:23.4, h:55},
  {name:'사무실', t:24.5, h:50},
  {name:'회의실', t:23.9, h:53},
  {name:'전산실#2', t:21.7, h:45},
  {name:'자료보관실', t:22.8, h:38},
  {name:'휴게실', t:24.1, h:57}
];
scatterChart.setOption({
  tooltip:{formatter:p=>`<b>${p.data.name}</b><br/>온도: ${p.data.value[0]}°C<br/>습도: ${p.data.value[1]}%`,
           ...darkTooltip},
  grid:{left:55, right:30, top:25, bottom:50},
  xAxis:{type:'value', name:'온도 (°C)', min:18, max:30, ...darkAxis,
         nameTextStyle:{color:'#94a3b8', fontSize:11}, nameLocation:'middle', nameGap:30},
  yAxis:{type:'value', name:'습도 (%)', min:30, max:80, ...darkAxis,
         nameTextStyle:{color:'#94a3b8', fontSize:11}, nameLocation:'middle', nameGap:38},
  series:[{
    type:'scatter', symbolSize:26,
    data:sensors.map(s=>({name:s.name, value:[s.t, s.h]})),
    label:{show:true, formatter:p=>p.data.name, position:'right',
           color:'#cbd5e1', fontSize:11},
    itemStyle:{
      color:p=>{
        const [t,h]=p.data.value;
        if(t>26 || h<40 || h>65) return '#f87171';
        if(t>25 || h<45) return '#fbbf24';
        return '#34d399';
      },
      opacity:0.9, borderColor:'#0b1220', borderWidth:2,
      shadowBlur:8, shadowColor:'rgba(0,0,0,.4)'
    },
    markArea:{
      silent:true,
      itemStyle:{color:'rgba(52,211,153,.08)',
                 borderColor:'rgba(52,211,153,.25)', borderWidth:1},
      label:{show:true, position:'insideTopLeft', color:'#34d399',
             fontSize:11, formatter:'안전 구간'},
      data:[[{xAxis:20, yAxis:45},{xAxis:25, yAxis:60}]]
    }
  }]
});

/* ---------- 반응형 ---------- */
const charts = [trendChart, gaugeChart, heatmapChart, scatterChart];
window.addEventListener('resize', ()=> charts.forEach(c=>c.resize()));

/* ---------- 실시간 갱신 시뮬레이션 ---------- */
setInterval(()=>{
  const now = new Date();
  document.getElementById('lastUpdate').textContent =
    now.toISOString().slice(0,19).replace('T',' ');
  const newTemp = +(22 + Math.random()*1.5).toFixed(1);
  const newHumid = Math.round(45 + Math.random()*8);
  gaugeChart.setOption({series:[{data:[{value:newTemp, name:'온도'}]},
                                {data:[{value:newHumid, name:'습도'}]}]});
}, 5000);
</script>
</body>
</html>
