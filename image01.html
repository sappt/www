<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Random Gallery</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            cursor: none; /* 커서 숨김 */
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 2s ease-in-out;
            opacity: 0; /* 기본 숨김 */
            z-index: 1;
        }

        .bg-image.visible {
            opacity: 1;
            z-index: 2;
        }
    </style>
</head>
<body>

    <img id="img1" class="bg-image visible" src="" alt="WallPaper 1">
    <img id="img2" class="bg-image" src="" alt="WallPaper 2">

    <script>
        const CHANGE_INTERVAL = 8000; // 8초
        const UNSPLASH_ACCESS_KEY = 'UiahWY-rovmFo8sPNTLqCj0ZJiLaS1mqefnIVh_ZBl8';

        // 현재 보여줄 레이어 (true면 img1, false면 img2)
        let isFirstImageActive = true;

        // Unsplash 이미지 URL 캐시 (한 번에 30장씩 가져오며, 사용한 이미지는 즉시 제거)
        const QUERIES = ['wallpaper', 'nature', 'landscape', 'architecture', 'city', 'abstract'];
        let queryIndex = 0;
        let imageCache = [];
        let usedPhotoIds = new Set();
        let isFetching = false;

        async function fetchUnsplashImages() {
            if (isFetching) return;
            isFetching = true;
            const query = QUERIES[queryIndex % QUERIES.length];
            queryIndex++;
            try {
                const res = await fetch(
                    `https://api.unsplash.com/photos/random?query=${query}&orientation=landscape&count=30`, {
                    headers: { 'Authorization': `Client-ID ${UNSPLASH_ACCESS_KEY}` }
                });
                if (!res.ok) throw new Error(`API 오류: ${res.status}`);
                const data = await res.json();
                const urls = data
                    .filter(photo => !usedPhotoIds.has(photo.id))
                    .map(photo => {
                        usedPhotoIds.add(photo.id);
                        return photo.urls.full + '&w=1920&h=1080&fit=crop';
                    });
                imageCache = imageCache.concat(urls);
            } catch (e) {
                console.error('Unsplash API 호출 실패:', e);
            }
            isFetching = false;
        }

        function getNextImageUrl() {
            // 캐시에 남은 이미지가 5장 이하면 미리 추가 로드
            if (imageCache.length <= 5) {
                fetchUnsplashImages();
            }
            if (imageCache.length > 0) {
                return imageCache.shift(); // 사용한 이미지 즉시 제거
            }
            // 캐시가 비어있을 경우 fallback (picsum)
            return `https://picsum.photos/1920/1080?random=${Date.now()}`;
        }

        function changeImage() {
            const nextImageElement = isFirstImageActive ? document.getElementById('img2') : document.getElementById('img1');
            const currentImageElement = isFirstImageActive ? document.getElementById('img1') : document.getElementById('img2');

            nextImageElement.src = getNextImageUrl();

            nextImageElement.onload = function() {
                nextImageElement.classList.add('visible');
                currentImageElement.classList.remove('visible');
                isFirstImageActive = !isFirstImageActive;
            };

            nextImageElement.onerror = function() {
                console.log("이미지 로드 실패, 재시도합니다.");
                changeImage();
            };
        }

        // 초기 실행: Unsplash 이미지 가져온 후 첫 이미지 표시
        fetchUnsplashImages().then(() => {
            document.getElementById('img1').src = getNextImageUrl();
        });

        // 주기적 실행
        setInterval(changeImage, CHANGE_INTERVAL);

        // 부모(kiosk.html)로 스페이스 키 이벤트 전달
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                if (window.parent !== window) {
                    window.parent.postMessage({ type: 'space-pressed' }, '*');
                }
            }
        });
    </script>
</body>
</html>
